# docker-compose.dev.yml
services:
  backend:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./packages/shared/src:/app/packages/shared/src
    ports:
      - "5432:5432"
      # - "5555:5555"

  frontend:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages/shared/src:/app/packages/shared/src

  nginx:
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"